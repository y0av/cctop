name: release

# Build native binaries for Linux, macOS (Intel + Apple Silicon) and Windows
# whenever a v* tag is pushed, and attach them to the GitHub Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          # Both macOS targets build on Apple-Silicon runners (macos-13 Intel
          # runners queue indefinitely); the x86_64 one cross-compiles, which
          # Apple's clang handles natively.
          - { os: macos-14,       target: x86_64-apple-darwin }
          - { os: macos-14,       target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ring (TLS backend) needs NASM to assemble on Windows.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar -czf cctop-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release cctop

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/cctop.exe -DestinationPath cctop-${{ matrix.target }}.zip

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: cctop-${{ matrix.target }}.*
